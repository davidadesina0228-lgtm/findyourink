<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />

<body>

  <a class="skip-link" href="#main">Skip to content</a>

          <a href="blog.html" class="btn btn--outline-cream">

          "Even when the path disappears,<br />
          the feet learn to find the way."
        </p>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
